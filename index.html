<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Cursos Online</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

header {
    padding: 40px 20px;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    color: #ccc;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 40px 20px;
}

.card {
    background: #1c1c1c;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.price {
    font-size: 28px;
    margin: 20px 0;
    color: #00ff88;
}

ul {
    list-style: none;
    padding: 0;
    text-align: left;
}

ul li {
    margin: 10px 0;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #00ff88;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

.button:hover {
    background: #00cc6a;
}

footer {
    padding: 20px;
    color: #777;
}
</style>

</head>
<body>

<header>
    <h1>Aprenda a Fazer Sua Primeira Venda Online</h1>
    <p>Curso prático e direto ao ponto</p>
</header>

<div class="container">

    <div class="card">
        <h2>Curso Completo Iniciante</h2>
        <p class="price">R$ 19,90</p>
        <ul>
            <li>✔ Como fazer sua primeira venda</li>
            <li>✔ Estratégias para Instagram</li>
            <li>✔ Técnicas simples de conversão</li>
            <li>✔ Acesso imediato</li>
        </ul>
        <a href="COLE_AQUI_SEU_LINK_DA_CAKTO" class="button" target="_blank">
            Comprar Agora
        </a>
    </div>

</div>

<footer>
    © 2026 - Todos os direitos reservados
</footer>

</body>
</html>
