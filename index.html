<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primeira Venda Já - Curso de Marketing</title><style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
}

header{
    text-align:center;
    padding:40px 20px;
    border-bottom:2px solid #00ff00;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    margin-top:10px;
    color:#00ff00;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.video-card{
    background:#111;
    margin:40px 0;
    padding:20px;
    border:2px solid #00ff00;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,255,0,0.2);
    opacity:0;
    transform:translateY(40px);
    transition:all 0.8s ease;
}

.video-card.show{
    opacity:1;
    transform:translateY(0);
}

.video-card h2{
    margin-top:0;
    margin-bottom:15px;
}

iframe{
    width:100%;
    height:400px;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    border-top:2px solid #00ff00;
    margin-top:40px;
    font-size:14px;
}

</style></head><body><header>
    <h1>Primeira Venda Já</h1>
    <p>Curso Completo de Marketing Digital</p>
</header><div class="container"><div class="video-card">
    <h2>Aula 1 - Marketing Digital (Prático)</h2>
    <iframe src="https://www.youtube.com/embed/dWU8u6qn4us" frameborder="0" allowfullscreen></iframe>
</div>

<div class="video-card">
    <h2>Aula 2 - Mentalidade do Empreendedor Digital</h2>
    <iframe src="https://www.youtube.com/embed/vczJS22gUnI" frameborder="0" allowfullscreen></iframe>
</div>

<div class="video-card">
    <h2>Aula 3 - Escolhendo um Produto para Vender</h2>
    <iframe src="https://www.youtube.com/embed/7U4gOiH0B-I" frameborder="0" allowfullscreen></iframe>
</div>

</div><footer>
© 2026 Primeira Venda Já - Todos os direitos reservados
</footer><script>
const cards = document.querySelectorAll('.video-card');

function revealOnScroll(){
    const windowHeight = window.innerHeight;
    cards.forEach(card => {
        const cardTop = card.getBoundingClientRect().top;
        if(cardTop < windowHeight - 50){
            card.classList.add('show');
        }
    });
}

window.addEventListener('scroll', revealOnScroll);
window.addEventListener('load', revealOnScroll);
</script></body>
</html>
