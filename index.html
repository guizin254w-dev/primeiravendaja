<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMind AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:20px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:800;
font-size:20px;
background:linear-gradient(90deg,#00f5a0,#00d9f5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.chat{
flex:1;
overflow-y:auto;
padding:30px;
}

.message{
margin-bottom:20px;
padding:15px;
border-radius:10px;
max-width:700px;
line-height:1.5;
}

.user{
background:#00d9f5;
color:black;
margin-left:auto;
}

.ai{
background:#1e293b;
}

.input-area{
display:flex;
gap:10px;
padding:20px;
background:#020617;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

button{
padding:14px 25px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00f5a0,#00d9f5);
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">NovaMind AI</div>
</header>

<div class="chat" id="chat">
<div class="message ai">Olá. Eu sou a NovaMind AI. Como posso ajudar?</div>
</div>

<div class="input-area">
<input id="input" placeholder="Digite sua mensagem">
<button onclick="send()">Enviar</button>
</div>

<script>

const API_KEY = "COLOQUE_SUA_CHAVE_AQUI"

async function send(){

const input=document.getElementById("input")
const chat=document.getElementById("chat")

if(input.value.trim()=="") return

const userText=input.value

chat.innerHTML+=`<div class="message user">${userText}</div>`

input.value=""

chat.innerHTML+=`<div class="message ai" id="loading">Pensando...</div>`

const response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"system",content:"Você é uma inteligência artificial útil e profissional."},
{role:"user",content:userText}
]

})

})

const data = await response.json()

document.getElementById("loading").remove()

chat.innerHTML+=`<div class="message ai">${data.choices[0].message.content}</div>`

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
