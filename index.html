<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área de Alunos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

.login-box {
    margin-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background: #00ff88;
    font-weight: bold;
}

#aulas {
    display: none;
    padding: 20px;
}

.video {
    margin: 30px 0;
}

iframe {
    width: 90%;
    max-width: 600px;
    height: 315px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="login" class="login-box">
    <h1>Área de Alunos</h1>
    <p>Digite a senha para acessar:</p>
    <input type="password" id="senha" placeholder="Senha">
    <br><br>
    <button onclick="entrar()">Entrar</button>
</div>

<div id="aulas">
    <h1>Curso Completo</h1>

    <div class="video">
        <h3>Aula 1</h3>
        <iframe src="https://www.youtube.com/embed/jTE_M6ekV28" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 2</h3>
        <iframe src="https://www.youtube.com/embed/emD7i6pQwrU" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 3</h3>
        <iframe src="https://www.youtube.com/embed/dDE66g3FptM" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 4</h3>
        <iframe src="https://www.youtube.com/embed/Pclwdyagty8" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 5</h3>
        <iframe src="https://www.youtube.com/embed/8izdzhz1zI4" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 6</h3>
        <iframe src="https://www.youtube.com/embed/YfRo5MMxkvg" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 7</h3>
        <iframe src="https://www.youtube.com/embed/leCXcq4DJ8w" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 8</h3>
        <iframe src="https://www.youtube.com/embed/s7yTWVdd7G4" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 9</h3>
        <iframe src="https://www.youtube.com/embed/DvmafnZNuPc" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula 10</h3>
        <iframe src="https://www.youtube.com/embed/nVGwhfmCTyg" allowfullscreen></iframe>
    </div>

    <div class="video">
        <h3>Aula Bônus</h3>
        <iframe src="https://www.youtube.com/embed/qGHbdm4FmaA" allowfullscreen></iframe>
    </div>

</div>

<script>
function entrar() {
    var senha = document.getElementById("senha").value;
    if (senha === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("aulas").style.display = "block";
    } else {
        alert("Senha incorreta!");
    }
}
</script>

</body>
</html>
