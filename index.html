<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Aulas Profissional</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* 🌟 Estilo Global */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0f19;
  color: #fff;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* 📌 Sidebar */

.sidebar {
  width: 280px;
  background: #08101c;
  padding: 30px;
  border-right: 1px solid rgba(255,255,255,0.1);
  overflow-y: auto;
}

.logo {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 20px;
  background: linear-gradient(90deg,#00f5a0,#00d9f5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.lesson {
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
  font-weight: 500;
}

.lesson:hover {
  background: #1f2937;
}

.lesson.active {
  background: linear-gradient(90deg,#00f5a0,#00d9f5);
  color: #0a0f19;
  font-weight: 700;
}

.checkmark {
  font-size: 14px;
  color: #00f5a0;
  display: none;
}

.lesson.completed .checkmark {
  display: block;
}

/* 📌 Main Content */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px;
  background: #0a101c;
}

.video-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

iframe {
  width: 100%;
  max-width: 960px;
  height: 540px;
  border: none;
  border-radius: 14px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

/* 📌 Estilo Responsivo */

@media (max-width: 900px) {
  body {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lesson {
    flex: 1 1 45%;
    text-align: center;
  }
  iframe {
    height: 320px;
  }
}

/* 📌 Destaque da Aula Bônus */

.bonus-label {
  font-size: 14px;
  font-weight: bold;
  color: #ffd700;
  margin-left: 8px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Plataforma de Aulas</div>

  <div class="lesson active" onclick="play(this, 'Pclwdyagty8')">
    Aula 1
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'dDE66g3FptM')">
    Aula 2
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'emD7i6pQwrU')">
    Aula 3
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'jTE_M6ekV28')">
    Aula 4
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'YfRo5MMxkvg')">
    Aula 5
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, '8izdzhz1zI4')">
    Aula 6
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'leCXcq4DJ8w')">
    Aula 7
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'nVGwhfmCTyg')">
    Aula 8
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'DvmafnZNuPc')">
    Aula 9
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 's7yTWVdd7G4')">
    Aula 10
    <span class="checkmark">✔</span>
  </div>

  <div class="lesson" onclick="play(this, 'qGHbdm4FmaA')">
    Aula Bônus <span class="bonus-label">BÔNUS ⭐</span>
  </div>

</div>

<div class="main">
  <div class="video-container">
    <iframe id="player" src="https://www.youtube.com/embed/Pclwdyagty8" allowfullscreen></iframe>
  </div>
</div>

<script>

function play(element, videoID) {
  // Marca aula ativa
  document.querySelectorAll('.lesson').forEach(item => {
    item.classList.remove('active');
  });
  element.classList.add('active');

  // Toca o vídeo
  document.getElementById('player').src = "https://www.youtube.com/embed/" + videoID;

  // Marca como concluída
  element.classList.add('completed');
}

</script>

</body>
</html>
