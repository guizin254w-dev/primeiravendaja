<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050b18;
  color:white;
}

/* Cabeçalho */
.header{
  padding:20px;
}

.header h1{
  font-size:26px;
  background:linear-gradient(90deg,#00f5a0,#00d9f5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.progress-bar{
  width:100%;
  height:10px;
  background:#1c2433;
  border-radius:20px;
  margin-top:10px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00f5a0,#00d9f5);
  transition:0.4s;
}

/* Vídeo */
.video-container{
  width:100%;
  padding:15px;
}

iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Lista de aulas */
.lessons{
  padding:15px;
}

.lesson{
  background:#101827;
  padding:18px;
  border-radius:15px;
  margin-bottom:15px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.lesson:hover{
  background:#1f2937;
}

.lesson.active{
  background:linear-gradient(90deg,#00f5a0,#00d9f5);
  color:#050b18;
  font-weight:bold;
}

.check{
  display:none;
  color:#00f5a0;
  font-weight:bold;
}

.lesson.completed .check{
  display:block;
}
</style>
</head>

<body>

<div class="header">
  <h1>Curso Premium</h1>
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<div class="video-container">
  <iframe id="player" src="https://www.youtube.com/embed/Pclwdyagty8" allowfullscreen></iframe>
</div>

<div class="lessons">

<div class="lesson active" onclick="play(this,'Pclwdyagty8')">Aula 1 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'dDE66g3FptM')">Aula 2 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'emD7i6pQwrU')">Aula 3 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'jTE_M6ekV28')">Aula 4 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'YfRo5MMxkvg')">Aula 5 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'8izdzhz1zI4')">Aula 6 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'leCXcq4DJ8w')">Aula 7 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'nVGwhfmCTyg')">Aula 8 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'DvmafnZNuPc')">Aula 9 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'s7yTWVdd7G4')">Aula 10 <span class="check">✔</span></div>
<div class="lesson" onclick="play(this,'qGHbdm4FmaA')">Aula Bônus ⭐ <span class="check">✔</span></div>

</div>

<script>

let total = 11;
let completed = 0;

function play(element,videoID){

document.getElementById("player").src =
"https://www.youtube.com/embed/"+videoID;

// remover active
document.querySelectorAll(".lesson").forEach(l=>{
l.classList.remove("active");
});

element.classList.add("active");

if(!element.classList.contains("completed")){
element.classList.add("completed");
completed++;
updateProgress();
}
}

function updateProgress(){
let percent = (completed/total)*100;
document.getElementById("progress").style.width = percent+"%";
}

</script>

</body>
</html>
